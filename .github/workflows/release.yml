name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup toolchain install
      - run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: ./format.sh --check

      - name: Clippy check
        run: ./check.sh --all-features

      - name: Run tests
        run: ./test.sh

  publish:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2

      - name: Authenticate with crates.io (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish aide-autodoc
        run: cargo publish -p aide-autodoc
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  attest:
    name: Build Attestation
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --release --workspace

      - name: Package crate for attestation
        run: |
          cargo package -p aide-autodoc --target-dir attestation-artifacts

          mkdir -p attestation-output
          find attestation-artifacts/package -name '*.crate' -exec cp {} attestation-output/ \;
          ls -la attestation-output/

      - name: Attest aide-autodoc crate
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'attestation-output/aide-autodoc-*.crate'

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
